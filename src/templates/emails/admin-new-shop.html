<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
</head>
<body style="margin:0;padding:0;">
  <div style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f5f5f7; padding:32px 0;">
    <div style="max-width:560px;margin:0 auto;background:#ffffff;border-radius:16px;padding:32px 28px;border:1px solid #edf0f4;">
      <div style="text-align:center;margin-bottom:24px;">
        <img src="<%= logoUrl %>" alt="Taja.Shop" style="max-width:180px;height:auto;margin-bottom:12px;" />
      </div>
      <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:6px;">New Shop</div>
      <div style="font-size:20px;font-weight:900;color:#0f172a;margin-bottom:12px;">A New Shop Has Been Created</div>
      <p style="font-size:14px;color:#334155;margin:0 0 16px;line-height:1.6;">
        A seller has set up a new shop and is waiting for you to verify their account before they can start selling.
      </p>
      <div style="background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:24px;border:1px solid #e2e8f0;font-size:14px;color:#0f172a;line-height:1.6;">
        <p style="margin:0 0 8px;"><strong>Shop Name:</strong> <%= shopName %></p>
        <p style="margin:0;"><strong>Owner:</strong> <%= ownerName %> (<%= ownerEmail %>)</p>
      </div>
      <div style="text-align:center;margin-bottom:24px;">
        <a href="<%= reviewUrl %>" style="display:inline-block;background:#0f172a;color:#ffffff;padding:12px 28px;border-radius:999px;font-size:13px;font-weight:600;text-decoration:none;">
          Review Shop
        </a>
      </div>
      <p style="font-size:12px;color:#9ca3af;margin:0;text-align:center;">
        © <%= year %> Taja Admin
      </p>
    </div>
  </div>
</body>
</html>
