<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
</head>
<body style="margin:0;padding:0;">
  <div style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f5f5f7; padding:32px 0;">
    <div style="max-width:560px;margin:0 auto;background:#ffffff;border-radius:16px;padding:32px 28px;border:1px solid #edf0f4;">
      <div style="text-align:center;margin-bottom:24px;">
        <img src="<%= logoUrl %>" alt="Taja.Shop" style="max-width:180px;height:auto;margin-bottom:12px;" />
      </div>

      <div style="text-align:center;margin-bottom:24px;">
        <span style="display:inline-block;padding:6px 12px;background:#ecfdf5;color:#059669;border-radius:999px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;">
          Security Verification
        </span>
      </div>

      <div style="font-size:24px;font-weight:900;color:#0f172a;margin-bottom:24px;text-align:center;">
        Verify your email
      </div>

      <p style="font-size:14px;color:#334155;margin:0 0 32px;line-height:1.6;text-align:center;">
        Hi <%= name %>, please use the verification code below to complete your registration.
      </p>

      <div style="background:#f8fafc;border-radius:12px;padding:32px 24px;margin-bottom:32px;border:1px solid #e2e8f0;text-align:center;">
        <div style="font-size:40px;font-weight:900;color:#0f172a;letter-spacing:8px;margin-bottom:12px;font-family:monospace;">
          <%= code %>
        </div>
        <div style="font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:0.1em;">
          Valid for 10 minutes
        </div>
      </div>

      <p style="font-size:13px;color:#64748b;margin:0 0 32px;text-align:center;line-height:1.6;">
        If you didn't request this code, you can safely ignore this email.
      </p>

      <p style="font-size:12px;color:#9ca3af;margin:0;text-align:center;">
        © <%= year %> Taja Shop • All rights reserved
      </p>
    </div>
  </div>
</body>
</html>
