<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your Taja account</title>
</head>

<body
  style="margin:0;padding:0;background-color:#f4f7f5;font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;color:#1a1a1a;line-height:1.5;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f4f7f5;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%"
          style="max-width:600px;background-color:#ffffff;border-radius:32px;overflow:hidden;box-shadow:0 40px 100px -20px rgba(0,0,0,0.05);">
          
          <!-- Header -->
          <tr>
            <td style="padding:48px 40px 32px; text-align:center;">
              <img src="<%= logoUrl %>" alt="Taja"
                style="max-width:140px;height:auto;margin-bottom:32px;display:inline-block;" />
              
              <div style="display:inline-block; padding:8px 16px; background-color:#ecfdf5; border-radius:100px; margin-bottom:24px;">
                <span style="color:#059669; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.1em;">Security Verification</span>
              </div>
              
              <h1 style="margin:0; font-size:32px; font-weight:900; color:#064e3b; letter-spacing:-0.03em; line-height:1.1;">
                Verify your email
              </h1>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding:0 40px 48px;">
              <p style="margin:0 0 40px; color:#4b5563; font-size:16px; text-align:center; max-width:400px; margin-left:auto; margin-right:auto;">
                Hi <%= name %>, please use the verification code below to complete your registration.
              </p>

              <!-- Code Box -->
              <div style="background-color:#f9fafb; border-radius:24px; padding:48px 32px; border:1px solid #f1f5f9; text-align:center;">
                <div style="font-size:48px; font-weight:900; color:#10b981; letter-spacing:12px; margin-bottom:12px;">
                  <%= code %>
                </div>
                <p style="margin:0; color:#9ca3af; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.1em;">
                  Valid for 10 minutes
                </p>
              </div>

              <p style="margin:40px 0 0; color:#9ca3af; font-size:13px; text-align:center; line-height:1.6;">
                If you didn't request this code, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f9fafb; padding:32px 40px; text-align:center; border-top:1px solid #f1f5f9;">
              <p style="margin:0; color:#9ca3af; font-size:12px; font-weight:500;">
                © <%= year %> Taja Shop • All rights reserved
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
