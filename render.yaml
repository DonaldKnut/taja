services:
  - type: web
    name: taja-shop-backend
    env: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
      - key: CLOUDFLARE_IMAGES_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_IMAGES_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: ASSISTANT_NAME
        value: Ada


